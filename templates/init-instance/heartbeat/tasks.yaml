# Heartbeat tasks — run via `jc-heartbeat run <task-name>` (cron-driven).
#
# Per-task fields:
#   tool:           adapter name (claude | codex | gemini | opencode | aider)
#   model:          model id for the tool; empty = tool's own default
#   folder:         working dir for the adapter (default: instance dir)
#   pre_fetch:      bash script path relative to <instance>/heartbeat/
#                   Writes bundle to stdout → captured to state/bundles/
#   context_files:  additional memory files to prepend (paths relative to instance)
#                   (memory/L1/*.md is always auto-included; no need to list)
#   only_if_delta:  skip send if bundle hash matches the last successful run
#   prompt:         task prompt. Template vars: {{date}} {{time}} {{timezone}} {{bundle_path}}
#   destination:    named destination from the `destinations:` block below
#                   (string for single, list for multi-fanout; omit to fall
#                   back to $TELEGRAM_CHAT_ID from .env)
#   schedule:       5-field cron expression (e.g. "30 3 * * *"). Used by
#                   `jc heartbeat cron sync` to install the calling user's
#                   crontab entry. Skipped if `enabled: false` or absent.
#
# Send the literal string "SILENT" as output to suppress Telegram delivery —
# useful for monitor-type tasks that only speak on escalation.

defaults:
  tool: claude
  model: claude-sonnet-4-6
  folder: ""   # empty = instance dir
  # destination: owner-dm    # uncomment to set a default destination

# destinations:
#   # Named chats — reference by name in a task's `destination:` field.
#   # Fully optional — if absent, tasks send to TELEGRAM_CHAT_ID from .env.
#   owner-dm:
#     channel: telegram
#     chat_id: 123456789            # Luca's personal DM (for critical alerts)
#   team-group:
#     channel: telegram
#     chat_id: -1001234567890       # team group (for routine reports)

tasks:

  # Smoke test — pings Telegram. Manual trigger to validate wiring.
  hello:
    prompt: |
      Respond with ONE short sentence confirming the heartbeat pipeline is alive.
      Mention the current time ({{time}}).

  # Built-in: trim memory/L1/HOT.md to its size caps (5 items per section)
  # and archive overflow to memory/L2/. Ships disabled — flip `enabled: true`
  # to commit changes (otherwise it runs as a dry-run and just reports).
  # Suggested cadence: once/day. No Telegram delivery.
  hot_tidy:
    builtin: hot_tidy
    enabled: false
    schedule: "15 4 * * *"   # 04:15 instance-local — once/day

  # Built-in: archive resolved threads + stale journal entries to L2.
  # Ships disabled. Suggested cadence: nightly.
  journal_tidy:
    builtin: journal_tidy
    enabled: false
    schedule: "30 4 * * *"   # 04:30 instance-local — once/day

  # Built-in: fire due deferred commitments from state/commitments/*.yaml.
  # Ships disabled. Suggested cadence after opt-in: every 5 minutes.
  commitments_tick:
    builtin: commitments_tick
    enabled: false
    schedule: "*/5 * * * *"  # every 5 min

  # Built-in: inspect tracked chats and queue re-engagement commitments when
  # silence crosses ops/reengage.yaml thresholds. Ships disabled.
  reengage_tick:
    builtin: reengage_tick
    enabled: false
    schedule: "0 * * * *"    # hourly on the hour

  # Built-in: run the offline reflection cycle and write a dream report.
  # Ships disabled. Suggested cadence after opt-in: nightly at 03:30 local.
  dream_tick:
    builtin: dream_tick
    enabled: false
    schedule: "30 3 * * *"   # 03:30 instance-local — once/day

  # Built-in: autonomous self-observation loop (RULES/IDENTITY/JOURNAL edits).
  # Ships disabled. Suggested cadence: nightly after dream_tick.
  self_model_run:
    builtin: self_model_run
    enabled: false
    schedule: "45 3 * * *"   # 03:45 instance-local — once/day

  # Example: a report that fans out to two destinations simultaneously.
  # Uncomment + wire up your destinations above to use.
  #
  # daily_report:
  #   destination: [team-group, owner-dm]
  #   prompt: |
  #     Compose the daily ops report for {{date}}. Use the bundle at
  #     {{bundle_path}} and L1 memory above. Keep it tight.
  #   pre_fetch: fetch/daily.sh
  #   only_if_delta: false
