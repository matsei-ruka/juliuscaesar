# Watchdog configuration — sourced by jc-watchdog tick.
#
# All values are OPTIONAL. Sensible defaults are used when unset.

# RUNTIME_MODE: gateway is the default production runtime. Use legacy-claude
# only when intentionally supervising a live Claude Telegram plugin session.
#
RUNTIME_MODE=gateway

# SESSION_ID: legacy Claude Code session UUID to resume on restart. Ignored in
# gateway mode.
#
# To get the id: start a session with `claude --channels plugin:telegram@...`,
# then look at the most recent file in
#   ~/.claude/projects/-<slugified-instance-path>/*.jsonl
# The filename minus .jsonl is the session id.
#
#SESSION_ID=

# SCREEN_NAME: State/log name and, in legacy mode, GNU screen session name.
# Default: jc-<instance-basename>. Override if you want a shorter name.
#
#SCREEN_NAME=

# CLAUDE_ARGS_EXTRA: legacy-mode extra flags passed to claude on spawn.
# Default includes --dangerously-skip-permissions, --chrome, and
# --channels plugin:telegram... Only set this if you know you're changing it.
#
#CLAUDE_ARGS_EXTRA=
