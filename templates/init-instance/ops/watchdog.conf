# Watchdog configuration — sourced by jc-watchdog tick.
#
# All values are OPTIONAL. Sensible defaults are used when unset.

# SESSION_ID: Claude Code session UUID to resume on restart. Without it,
# each restart starts a fresh session and the assistant loses conversation
# memory from before the crash.
#
# To get the id: start a session with `claude --channels plugin:telegram@...`,
# then look at the most recent file in
#   ~/.claude/projects/-<slugified-instance-path>/*.jsonl
# The filename minus .jsonl is the session id.
#
#SESSION_ID=

# SCREEN_NAME: GNU screen session name. Default: jc-<instance-basename>.
# Override if you want a shorter / different name.
#
#SCREEN_NAME=

# CLAUDE_ARGS_EXTRA: extra flags passed to claude on spawn. Default includes
# --dangerously-skip-permissions, --chrome, and --channels plugin:telegram...
# Only set this if you know you're changing it.
#
#CLAUDE_ARGS_EXTRA=
