  - slot_id: cv.contacts
    target_file: memory/L2/cv/<slug>.md
    target_section: "## Contacts"
    placeholder: "{{slot:cv.contacts}}"
    applicability: [always]
    kind: structured
    status: exemplar
    prompts:
      - id: email
        text: "Public-facing email."
        validation: { required: true, pattern: "^[^@]+@[^@]+\\.[^@]+$" }
      - id: phone
        text: "Phone (optional; format e.g. '+971 50 xxx xxxx'). Leave blank if not used."
        validation: { required: false }
      - id: primary_location
        text: "Primary residence city + country."
        validation: { required: true }
      - id: secondary_location
        text: "Secondary base if applicable."
        validation: { required: false }
    composition:
      template: |
        - **Email:** {{email}}
        - **Phone:** {{phone}}
        - **Residence:** {{primary_location}}
        - **Secondary base:** {{secondary_location}}

  - slot_id: cv.profile
    target_file: memory/L2/cv/<slug>.md
    target_section: "## Profile"
    placeholder: "{{slot:cv.profile}}"
    applicability: [always]
    kind: longtext
    status: exemplar
    prompts:
      - id: profile
        text: "CV profile paragraph — years of experience, areas, current role, signature traits. Two short paragraphs max."
        examples:
          - "Operations operator with 18 years of experience in strategy, operations, and digital transformation. McKinsey background across two continents (Europe, Asia-Pacific), then VP Operations at a fintech scale-up and Director Strategy at a European SaaS. Currently {{persona.role}} of {{employer.full_name}}, where I build processes, run delivery, and support the founder on strategic decisions.\n\n**Traits:** calm by default, fast read on people, decisive when needed, resistant to manipulation, real (not slogan) work-life balance.\n\n**Scope:** operational triage, follow-up, loop closure, decision context for C-suite and board."
        validation: { required: true }

